<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .envelope {
            width: 150px;
            margin: 10px;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            justify-items: center;
        }

        #main-content { display: none; text-align: center; }
    </style>
</head>
<body>

    <button id="intro-btn">Click to open your gifts</button>

    <div id="main-content">
        <!-- 3 Envelopes on each side (total 6) -->
        <div class="grid-container">
            <!-- Replace with the path to image_6fb4d1.png -->
            <img src="image_6fb4d1.png" class="envelope">
            <img src="image_6fb4d1.png" class="envelope">
            <img src="image_6fb4d1.png" class="envelope">
            
            <div style="grid-column: 1 / -1; margin: 20px;">
                <!-- Replace with the path to image_700744.jpg -->
                <img src="image_700744.jpg" style="width: 300px; border-radius: 15px;">
                <h1>To My Love</h1>
            </div>

            <img src="image_6fb4d1.png" class="envelope">
            <img src="image_6fb4d1.png" class="envelope">
            <img src="image_6fb4d1.png" class="envelope">
        </div>
    </div>

    <script>
        document.getElementById('intro-btn').addEventListener('click', () => {
            document.getElementById('intro-btn').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        });
    </script>
</body>
</html>
