<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 6-Month Monthsary! ❤️</title>
    <style>
        body { font-family: 'Georgia', serif; background: #ffdee9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; margin: 0; }
        
        /* Layout Grid */
        .main-container { display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; gap: 40px; max-width: 1000px; padding: 20px; }
        
        .envelope { width: 180px; height: 120px; background: #fffaf0; border: 2px solid #e3beaa; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.3s; margin: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .envelope:hover { transform: scale(1.05); }

        /* Cursor Trail Logic */
        .cursor-emoji { position: fixed; pointer-events: none; z-index: 9999; animation: fadeUp 1s ease-out forwards; font-size: 20px; }
        @keyframes fadeUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }
    </style>
</head>
<body>

    <div class="main-container">
        <div>
            <div class="envelope">Month 1</div>
            <div class="envelope">Month 2</div>
            <div class="envelope">Month 3</div>
        </div>

        <div style="text-align: center;">
            <h1>To My Love</h1>
            <p>Our journey is just beginning...</p>
        </div>

        <div>
            <div class="envelope">Month 4</div>
            <div class="envelope">Month 5</div>
            <div class="envelope">Month 6</div>
        </div>
    </div>

    <script>
        const emojis = ['❤️', '✨', '🌹', '💌', '💘'];
        document.addEventListener('mousemove', (e) => {
            const h = document.createElement('div');
            h.className = 'cursor-emoji';
            h.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            h.style.left = e.clientX + 'px';
            h.style.top = e.clientY + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        });
    </script>
</body>
</html>
